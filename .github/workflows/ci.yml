name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # Crawler tests drive a real browser against a local fixture site.
      - run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test
